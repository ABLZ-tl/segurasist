name: CI

# Sprint 1 — S1-06.
# Workflow listo para correr cuando GH-001 desbloquee (creación del org GitHub
# `segurasist` con sus 3 repos privados). Por ahora vive en el repo como
# "source of truth" del pipeline; ejecutará en push/PR contra main una vez
# pusheado al remoto.
#
# Jobs:
#   - changes: detecta qué sub-proyecto cambió (paths-filter) para no correr
#     todo el pipeline en cambios menores de docs/infra
#   - api-lint-typecheck / api-unit / api-e2e: para segurasist-api
#   - api-security-scan / web-security-scan: npm/pnpm audit + Semgrep
#     (rulesets OWASP Top 10, JWT, secrets, runtime). Modo `--error` para que
#     findings hagan fail del pipeline. Sólo `--audit-level=high` (low/moderate
#     descartados por ruido — Sprint 5 va a endurecer la barra).
#   - api-dast / web-dast: S2-08. OWASP ZAP baseline scan contra una API/web
#     levantada localmente en el runner. Falla el job si hay findings con
#     risk_code >= 3 (HIGH). Excepciones documentadas en `.zap/rules.tsv`.
#   - dependency-review: sólo PR; usa actions/dependency-review-action@v4 para
#     bloquear vulns nuevos introducidos por el diff y deny-list de licencias
#     copyleft fuertes (GPL-3.0 / AGPL-3.0) que rompen el modelo SaaS.
#   - web-lint-typecheck / web-unit: para segurasist-web (admin + ui + auth)
#   - ci-success: gate agregada — falla el pipeline si cualquier job requerido
#     no pasó (incluye skipped por path-filter como pass implícito)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  # S2-08: cancel-in-progress: true en todos los eventos (incluye push) para
  # evitar acumular runs DAST (cada uno levanta docker compose + ZAP, ~15 min).
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '20.11.x'
  PNPM_VERSION: '9'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'segurasist-api/**'
              - '.github/workflows/ci.yml'
              - '.zap/rules.tsv'
            web:
              - 'segurasist-web/**'
              - '.github/workflows/ci.yml'
              - '.zap/rules.tsv'

  # ----------------------------------------------------------------------
  # segurasist-api
  # ----------------------------------------------------------------------

  api-lint-typecheck:
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: segurasist-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: segurasist-api/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  api-unit:
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: segurasist-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: segurasist-api/package-lock.json
      - run: npm ci
      - run: npm run test:unit -- --coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-unit-coverage
          path: segurasist-api/coverage
          retention-days: 7

  api-security-scan:
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: segurasist-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: segurasist-api/package-lock.json
      - run: npm ci

      - name: npm audit (high+critical)
        # Excluye low/moderate por ruido. Sprint 5: endurecer a moderate
        # cuando esté la lista de excepciones revisada.
        run: npm audit --audit-level=high

      - name: Semgrep CI scan
        # Rulesets:
        #   - p/typescript: lints específicos del lenguaje
        #   - p/owasp-top-ten: cobertura A01..A10
        #   - p/jwt: malos usos de tokens (alg=none, etc.)
        #   - p/secrets: credenciales hardcoded
        #   - p/nodejs: patrones inseguros runtime (child_process, eval...)
        # `--error` hace que el job falle si hay findings.
        run: |
          docker run --rm -v "${GITHUB_WORKSPACE}/segurasist-api:/src" \
            returntocorp/semgrep:latest \
            semgrep ci \
              --config p/typescript \
              --config p/owasp-top-ten \
              --config p/jwt \
              --config p/secrets \
              --config p/nodejs \
              --error
        working-directory: ${{ github.workspace }}

  api-e2e:
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: segurasist-api
    env:
      # Mismas overrides que `scripts/local-up.sh` aplica al .env local
      AWS_ENDPOINT_URL: http://localhost:4566
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      LOCALSTACK_REGION: us-east-1
      COGNITO_REGION: local
      COGNITO_ENDPOINT: http://0.0.0.0:9229
      DATABASE_URL: postgresql://segurasist:segurasist@localhost:5432/segurasist?schema=public
      REDIS_URL: redis://localhost:6379/0
      EMAIL_TRANSPORT: smtp
      SMTP_HOST: localhost
      SMTP_PORT: '1025'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: segurasist-api/package-lock.json

      - name: Install npm deps
        run: npm ci

      - name: Verify required CLI tools
        run: |
          aws --version
          psql --version
          jq --version
          docker --version
          docker compose version

      - name: Bootstrap .env from example
        run: |
          cp .env.example .env
          {
            echo ""
            echo "AWS_ENDPOINT_URL=${AWS_ENDPOINT_URL}"
            echo "AWS_REGION=${AWS_REGION}"
            echo "AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}"
            echo "AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}"
            echo "COGNITO_REGION=${COGNITO_REGION}"
            echo "COGNITO_ENDPOINT=${COGNITO_ENDPOINT}"
            echo "EMAIL_TRANSPORT=${EMAIL_TRANSPORT}"
            echo "SMTP_HOST=${SMTP_HOST}"
            echo "SMTP_PORT=${SMTP_PORT}"
          } >> .env

      - name: docker compose up
        run: docker compose up -d

      - name: Wait for healthy
        run: |
          for i in $(seq 1 60); do
            unhealthy=$(docker compose ps --format json \
              | grep -c '"Health":"unhealthy"\|"Health":"starting"' || true)
            if [ "$unhealthy" = "0" ]; then
              echo "All services healthy"
              docker compose ps
              break
            fi
            sleep 1
            if [ "$i" = "60" ]; then
              echo "Services failed to become healthy in 60s"
              docker compose ps
              docker compose logs --tail 100
              exit 1
            fi
          done

      - name: LocalStack bootstrap
        run: ./scripts/localstack-bootstrap.sh

      - name: Prisma migrate deploy
        run: npx prisma migrate deploy

      - name: Apply RLS policies
        run: ./scripts/apply-rls.sh

      - name: Prisma seed
        run: npx prisma db seed

      - name: Cognito-local bootstrap
        run: ./scripts/cognito-local-bootstrap.sh

      - name: Run e2e tests
        run: npm run test:e2e

      - name: docker compose logs (on failure)
        if: failure()
        run: docker compose logs --tail 200

      - name: docker compose down
        if: always()
        run: docker compose down -v

  # ----------------------------------------------------------------------
  # api-dast — S2-08
  # OWASP ZAP baseline scan contra la API arrancada local en el runner.
  # Falla el job si hay findings con risk_code >= 3 (HIGH).
  # Excepciones / endurecimiento por regla en `.zap/rules.tsv`.
  # ----------------------------------------------------------------------

  api-dast:
    needs:
      - changes
      - api-e2e
    if: ${{ needs.changes.outputs.api == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        working-directory: segurasist-api
    env:
      AWS_ENDPOINT_URL: http://localhost:4566
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      LOCALSTACK_REGION: us-east-1
      COGNITO_REGION: local
      COGNITO_ENDPOINT: http://0.0.0.0:9229
      DATABASE_URL: postgresql://segurasist:segurasist@localhost:5432/segurasist?schema=public
      REDIS_URL: redis://localhost:6379/0
      EMAIL_TRANSPORT: smtp
      SMTP_HOST: localhost
      SMTP_PORT: '1025'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: segurasist-api/package-lock.json

      - name: Install npm deps
        run: npm ci

      - name: Bootstrap .env
        run: |
          cp .env.example .env
          {
            echo ""
            echo "AWS_ENDPOINT_URL=${AWS_ENDPOINT_URL}"
            echo "AWS_REGION=${AWS_REGION}"
            echo "AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}"
            echo "AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}"
            echo "COGNITO_REGION=${COGNITO_REGION}"
            echo "COGNITO_ENDPOINT=${COGNITO_ENDPOINT}"
            echo "EMAIL_TRANSPORT=${EMAIL_TRANSPORT}"
            echo "SMTP_HOST=${SMTP_HOST}"
            echo "SMTP_PORT=${SMTP_PORT}"
          } >> .env

      - name: docker compose up
        run: docker compose up -d postgres redis localstack mailpit cognito-local

      - name: Wait for healthy
        run: |
          for i in $(seq 1 60); do
            unhealthy=$(docker compose ps --format json \
              | grep -c '"Health":"unhealthy"\|"Health":"starting"' || true)
            if [ "$unhealthy" = "0" ]; then
              echo "All services healthy"
              break
            fi
            sleep 1
            if [ "$i" = "60" ]; then
              echo "Services failed to become healthy in 60s"
              docker compose ps
              docker compose logs --tail 100
              exit 1
            fi
          done

      - name: LocalStack bootstrap
        run: ./scripts/localstack-bootstrap.sh

      - name: Prisma migrate deploy
        run: npx prisma migrate deploy

      - name: Apply RLS policies
        run: ./scripts/apply-rls.sh

      - name: Cognito-local bootstrap
        run: ./scripts/cognito-local-bootstrap.sh

      - name: Build API
        run: npm run build

      - name: Start API in background
        run: |
          NODE_ENV=production node dist/main.js > /tmp/api.log 2>&1 &
          echo $! > /tmp/api.pid

      - name: Wait for API ready
        run: npx wait-on -t 60000 http://localhost:3000/health/ready

      # OWASP ZAP Baseline. Recorre la spec OpenAPI y hace passive scan en cada
      # endpoint. Falla automáticamente si hay alerts con risk_code>=3 (High).
      # Reglas de override (IGNORE / FAIL) en .zap/rules.tsv.
      - name: OWASP ZAP Baseline
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: 'http://localhost:3000/v1/openapi.json'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j -m 5'
          fail_action: true
          allow_issue_writing: false
          artifact_name: zap-report-api

      - name: Print API logs (on failure)
        if: failure()
        run: cat /tmp/api.log || true
        working-directory: ${{ github.workspace }}

      - name: Stop API
        if: always()
        run: |
          if [ -f /tmp/api.pid ]; then kill "$(cat /tmp/api.pid)" || true; fi
        working-directory: ${{ github.workspace }}

      - name: docker compose down
        if: always()
        run: docker compose down -v

  # ----------------------------------------------------------------------
  # segurasist-web
  # ----------------------------------------------------------------------

  web-lint-typecheck:
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: segurasist-web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: segurasist-web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo lint typecheck

  web-unit:
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: segurasist-web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: segurasist-web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo test:unit
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-unit-coverage
          path: |
            segurasist-web/apps/admin/coverage
            segurasist-web/packages/ui/coverage
            segurasist-web/packages/auth/coverage
          retention-days: 7

  web-security-scan:
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: segurasist-web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: segurasist-web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile

      - name: pnpm audit (prod, high+critical)
        # Sólo prod deps — devDeps tienden a tener CVE noisy de tooling
        # (eslint plugins, etc.) que no llegan al runtime.
        run: pnpm audit --audit-level=high --prod

      - name: Semgrep CI scan
        # Rulesets:
        #   - p/react: hooks, refs, dangerouslySetInnerHTML, etc.
        #   - p/nextjs: SSR/SSG injection patterns
        #   - p/typescript: idem api
        #   - p/owasp-top-ten: cobertura cross-cutting
        run: |
          docker run --rm -v "${GITHUB_WORKSPACE}/segurasist-web:/src" \
            returntocorp/semgrep:latest \
            semgrep ci \
              --config p/react \
              --config p/nextjs \
              --config p/typescript \
              --config p/owasp-top-ten \
              --error
        working-directory: ${{ github.workspace }}

  # ----------------------------------------------------------------------
  # web-dast — S2-08
  # OWASP ZAP baseline scan contra apps/admin (:3001) y apps/portal (:3002).
  # Pasive scan + AJAX spider. Falla si findings HIGH.
  # Verifica especialmente: CSP, HSTS, X-Frame-Options, cookie attributes
  # (Secure / HttpOnly / SameSite=Strict — gate auditoría M6/L3).
  # ----------------------------------------------------------------------

  web-dast:
    needs:
      - changes
      - web-unit
    if: ${{ needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: admin
            port: 3001
            target_path: 'login'
          - app: portal
            port: 3002
            target_path: ''
    defaults:
      run:
        working-directory: segurasist-web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: segurasist-web/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Build ${{ matrix.app }}
        run: pnpm --filter "@segurasist/${{ matrix.app }}" build

      - name: Start ${{ matrix.app }} in background
        run: |
          pnpm --filter "@segurasist/${{ matrix.app }}" start --port ${{ matrix.port }} \
            > /tmp/${{ matrix.app }}.log 2>&1 &
          echo $! > /tmp/${{ matrix.app }}.pid

      - name: Wait for ${{ matrix.app }} ready
        run: npx wait-on -t 60000 "http://localhost:${{ matrix.port }}/${{ matrix.target_path }}"

      - name: OWASP ZAP Baseline (${{ matrix.app }})
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: 'http://localhost:${{ matrix.port }}/${{ matrix.target_path }}'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j -m 5'
          fail_action: true
          allow_issue_writing: false
          artifact_name: zap-report-web-${{ matrix.app }}

      - name: Print ${{ matrix.app }} logs (on failure)
        if: failure()
        run: cat /tmp/${{ matrix.app }}.log || true
        working-directory: ${{ github.workspace }}

      - name: Stop ${{ matrix.app }}
        if: always()
        run: |
          if [ -f /tmp/${{ matrix.app }}.pid ]; then
            kill "$(cat /tmp/${{ matrix.app }}.pid)" || true
          fi
        working-directory: ${{ github.workspace }}

  # ----------------------------------------------------------------------
  # Dependency review — sólo en PRs (compara base..HEAD)
  # ----------------------------------------------------------------------

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
          # Licencias copyleft fuertes incompatibles con modelo SaaS
          # propietario (la integración con un componente AGPL nos
          # forzaría a liberar el backend). MIT/Apache/BSD permitidas.
          deny-licenses: GPL-3.0, AGPL-3.0

  # ----------------------------------------------------------------------
  # Aggregate gate — un solo check requerido en branch protection
  # ----------------------------------------------------------------------

  ci-success:
    needs:
      - api-lint-typecheck
      - api-unit
      - api-e2e
      - api-security-scan
      - api-dast
      - web-lint-typecheck
      - web-unit
      - web-security-scan
      - web-dast
      - dependency-review
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs passed (or were skipped by path-filter)
        run: |
          fail=0
          # Jobs que aplican a todos los eventos (push y pull_request).
          # `skipped` se trata como pass (paths-filter excluyó el subproyecto).
          for r in \
            "${{ needs.api-lint-typecheck.result }}" \
            "${{ needs.api-unit.result }}" \
            "${{ needs.api-e2e.result }}" \
            "${{ needs.api-security-scan.result }}" \
            "${{ needs.api-dast.result }}" \
            "${{ needs.web-lint-typecheck.result }}" \
            "${{ needs.web-unit.result }}" \
            "${{ needs.web-security-scan.result }}" \
            "${{ needs.web-dast.result }}"; do
            case "$r" in
              success|skipped) ;;
              *) echo "Job result '$r' failed gate"; fail=1 ;;
            esac
          done
          # dependency-review sólo es required en PR. En push a main su
          # resultado es 'skipped' por la guard `if: github.event_name == ...`.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            case "${{ needs.dependency-review.result }}" in
              success) ;;
              *) echo "dependency-review failed (PR-only gate)"; fail=1 ;;
            esac
          fi
          exit "$fail"
